<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 400px;
            border-collapse: collapse;
        }

        td,th{
            border: 1px solid black;
        }

        .titulo{
            background-color: rgb(158, 156, 156);
            color: white;
            padding: 5px;
        }
    </style>
</head>
<body>
    <table>
        <thead>

            <th class="titulo" rowspan="2">Área</th>
            <th class="titulo" rowspan="2">Disciplinas</th>
            <th class="titulo" colspan="2">Notas</th>
        
            <th class="titulo" rowspan="2">Média</th>
            <tr>
                <th class="titulo">Nota 1</th>
                <th class="titulo">Nota 2</th>
            </tr>
            
        </thead>
        <tbody>
            <th rowspan="5">Exatas</th>
            <tr>
                <td>Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
                 
            </tr>
            <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
                
            </tr>
            <tr>
                <td>Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
                
            </tr>
            <tr>
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
               >
            </tr>
            <tr>
                <th colspan="4" class="titulo">Média de exatas</th>
                <td class="titulo">0.0</td>
            </tr>
            <tr>
                <th rowspan="2">Humanas</th>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
                >
            </tr>
            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
                
            </tr>
            <tr>
                <th colspan="4" class="titulo">Média de Humanas</th>
                <td class="titulo">0.0</td>
            </tr>

        </tbody>
    </table>
</body>
</html>
