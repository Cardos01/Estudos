<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>

    <form action="cadastro.php" method="get" autocomplete="on">

        <p><label for="inome">Nome:</label> 
        <input type="text" name="nome" id="inome" autocomplete="name" placeholder="digite seu nome completo" required maxlength="30"></p>

        <p>média: <input type="number" step="0.1" min="0" max="10" placeholder="0 à 10" required></p>

        <p>período letivo: <input type="month"></p>

        <p>fodase: <input type="date"></p>

        <p>
            <input type="submit">
            <input type="reset">
        </p>
    </form>
</body>
</html>
