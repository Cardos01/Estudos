<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
</head>
<body>
    <form action="cadastro.php" method="get">

        <h1>exemplo de formulário</h1>

        <p>
            <label for="iest">Seu Estado:</label>
             <select name="estado" id="iest">

                <optgroup label="Pobre Fudido">
                    <option value="RN"> Rio Grande do Norte</option>
                    <option value="PE">Pernambuco</option>
                    <option value="CE">Ceará</option>
                    <option value="BH">Bahia</option>
                    <option value="MA"> Maranhão</option>
                    <option value="PI">Piauí</option>
                    <option value="SE">Sergipe</option>
                    <option value="AL">Alagoas</option>
                    <option value="PB">Paraíba</option>
                </optgroup>

                <optgroup label="Indio">
                    <option value="Am">Amazonas</option>
                    <option value="AP">Amapá</option>
                    <option value="AC">Acre</option>
                    <option value="RO">Roraima</option>
                    <option value="RR">Rondônia</option>
                    <option value="PA">pará</option>
                    <option value="TO">Tocantíns</option>
                </optgroup>

                <optgroup label="Projeto de cowboy">
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="GO">Goiás</option>
                    <option value="DF">Destrito Federal</option>
                    <option value="MT">Mato Grosso</option>
                </optgroup>

                <optgroup label="Noia ou Traficante">
                    <option value="MG">Minas Gerais</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="SP">São Paulo</option>
                    <option value="ES">Espirito Santo</option>
                </optgroup>

                <optgroup label="Possivel Nazista">
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="PR">Paraná</option>
                </optgroup>
             </select>

        </p>
         
        <p>
            <label for="iprof">profissão:</label>
            <input type="text" name="prof" id="iprof" list="iprof">
            <datalist id="iprof">
                <option>Administrador</option>
                <option >Desenvolvedor</option>
                <option >Cozinheiro</option>
                <option>Médico</option>
            </datalist>
        </p>
       

        <p>
            <input type="submit">
            <input type="reset">
        </p>
    </form> 
</body>
</html>
