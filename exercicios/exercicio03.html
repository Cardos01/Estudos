<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelation</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        td,th{
            border: 1px solid black;
            padding: 10px;
        }
        .cnome{
            background-color: red;
        }
        .cgenero{
            background-color: gainsboro;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
        <col class="cnome">
        <col class="cgenero">
        <col class="cidade">
        <col class="cprof">
        </colgroup>
        <caption>titulo aleatório</caption>
        <thead>
            <tr>
                <th scope="col">Nome</th>
                <th scope="col">Gênero</th>
                <th scope="col">Idade</th>
                <th scope="col">Profissão</th>
            </tr>
            <tr>
                <td>Ana Maria</td>
                <td>F</td>
                <td>25</td>
                <td>Puta</td>
            </tr>
            <tr>
                <td>Cláudio</td>
                <td>M</td>
                <td>28</td>
                <td>Traficante</td>
            </tr>
            <tr>
                <td>Letícia</td>
                <td>F</td>
                <td>99</td>
                <td>Dona da Boca</td>
            </tr>
            <tr>
                <td>Rogerinho</td>
                <td>M</td>
                <td>11</td>
                <td>Jogador</td>
            </tr>
            <tr>
                <td>Paola</td>
                <td>F</td>
                <td>33</td>
                <td>tcheka voadora</td>
            </tr>
            <tr>
                <td>Gustavo</td>
                <td>M</td>
                <td>42</td>
                <td>Padre ex-gay</td>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    
</body>
</html>
